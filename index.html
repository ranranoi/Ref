<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REF — 보험 UI 레퍼런스</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --label-normal:#171719;
  --label-strong:#000;
  --label-neutral:#3E3E42;
  --label-alt:#5D5D61;
  --label-assist:#878787;
  --label-disable:#C2C2C6;
  --bg:#F7F7F8;
  --surface:#fff;
  --bg-deep:#EBEBED;
  --line-alt:rgba(112,115,124,0.16);
  --line:rgba(112,115,124,0.28);
  --primary:#355FFF;
  --primary-alt:#E8ECFF;
  --primary-dark:#1B43E8;
  --error:#FF4242;
  --error-bg:#FFF5F5;
  --error-line:#FFCCCC;
  --r-xs:4px;--r-sm:6px;--r-md:8px;--r-lg:12px;--r-xl:16px;--r-full:9999px;
}
html,body{height:100%;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--label-normal);font-size:14px;line-height:1.5}

/* ─── NAV ─── */
.nav{position:sticky;top:0;z-index:200;height:56px;background:var(--surface);border-bottom:1px solid var(--line-alt);display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:12px}
.logo{font-size:20px;font-weight:800;letter-spacing:-1px;color:var(--label-strong);flex-shrink:0}
.seg-ctrl{display:flex;background:var(--bg);border-radius:var(--r-md);padding:3px;gap:2px}
.seg-btn{padding:6px 16px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--label-assist);font-family:inherit;transition:all .15s;white-space:nowrap}
.seg-btn.active{background:var(--surface);color:var(--label-normal);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.nav-right{display:flex;gap:8px;align-items:center}
.btn-primary{height:36px;padding:0 16px;background:var(--primary);color:#fff;border:none;border-radius:var(--r-md);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;flex-shrink:0}
.btn-primary:hover{background:var(--primary-dark)}
.avatar{width:34px;height:34px;border-radius:var(--r-full);background:var(--label-normal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}

/* ─── PAGE ─── */
.page{display:none;min-height:calc(100vh - 56px)}
.page.active{display:flex;flex-direction:column}
#page-admin.active{display:block !important;padding:24px}
#page-mypage.active{display:block !important;padding:24px}

/* ─── GALLERY TOPBAR ─── */
.gallery-topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--line-alt);flex-shrink:0}
.ins-chips{display:flex;gap:4px}
.chip{height:32px;padding:0 14px;border-radius:var(--r-full);border:1.5px solid var(--line);background:var(--surface);font-size:12px;font-weight:600;color:var(--label-assist);cursor:pointer;font-family:inherit;transition:all .18s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.chip:hover{border-color:var(--label-normal);color:var(--label-normal)}
.chip.active{background:var(--label-normal);color:#fff;border-color:var(--label-normal)}
.chip[data-ins="A"].active{background:#1A5DC8;border-color:#1A5DC8}
.chip[data-ins="B"].active{background:#007A38;border-color:#007A38}
.chip[data-ins="C"].active{background:#A05200;border-color:#A05200}
.chip-dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.7}

/* ─── LIGHTBOX ─── */
.lightbox-bg{display:none;position:fixed;inset:0;background:rgba(10,10,12,.92);z-index:500;flex-direction:column;backdrop-filter:blur(8px)}
.lightbox-bg.open{display:flex}
.lb-header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.lb-header-left{display:flex;flex-direction:column;gap:2px}
.lb-title{font-size:15px;font-weight:700;color:#fff}
.lb-meta{font-size:12px;color:rgba(255,255,255,.45)}
.lb-header-right{display:flex;align-items:center;gap:8px}
.lb-like-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:rgba(255,255,255,.6);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-full);padding:6px 14px;cursor:pointer;font-family:inherit;transition:all .15s}
.lb-like-btn:hover{background:rgba(255,255,255,.14)}
.lb-like-btn.liked{color:#FF6B6B;background:rgba(255,107,107,.12);border-color:rgba(255,107,107,.3)}
.lb-icon-btn{width:36px;height:36px;border-radius:var(--r-full);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.lb-icon-btn:hover{background:rgba(255,255,255,.16);color:#fff}
.lb-body{display:flex;align-items:center;justify-content:center;flex:1;gap:20px;padding:12px 20px;overflow:hidden;position:relative}
.lb-nav{width:40px;height:40px;border-radius:var(--r-full);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;z-index:10}
.lb-nav:hover{background:rgba(255,255,255,.2);color:#fff;transform:scale(1.06)}
.lb-nav:disabled{opacity:.2;cursor:default;transform:none}
.lb-phone-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;height:100%}
.lb-phone{height:calc(92vh - 56px - 24px - 20px);aspect-ratio:390/844;background:#1a1a2e;border-radius:8px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.5);display:flex;flex-direction:column}
.lb-phone-notch{display:none}
.lb-phone-screen{flex:1;background:#1a1a2e;position:relative;overflow:hidden}
.lb-phone-screen img{width:100%;height:100%;object-fit:contain;display:block;position:absolute;inset:0;background:#000}
.lb-phone-label{font-size:11px;color:rgba(255,255,255,.35);text-align:center;font-weight:500;flex-shrink:0}
.lb-panel{width:280px;flex-shrink:0;height:100%;overflow-y:auto;display:flex;flex-direction:column;gap:0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.lb-panel-section{padding:0 0 20px}
.lb-info-grid{display:flex;flex-direction:column;gap:4px}
.lb-info-item{display:flex;flex-direction:column;gap:3px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.lb-info-item:last-child{border-bottom:none}
.lb-info-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:.8px;text-transform:uppercase}
.lb-info-row{display:flex;align-items:center;gap:8px}
.lb-info-val{font-size:13px;font-weight:600;color:rgba(255,255,255,.85);flex:1}
.lb-edit-inp{flex:1;height:30px;padding:0 10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:var(--r-sm);font-size:12px;font-family:inherit;color:#fff;outline:none}
.lb-edit-inp:focus{border-color:rgba(255,255,255,.45)}
.lb-edit-sel{flex:1;height:30px;padding:0 8px;background:rgba(30,30,40,1);border:1px solid rgba(255,255,255,.2);border-radius:var(--r-sm);font-size:12px;font-family:inherit;color:#fff;outline:none;cursor:pointer}
.lb-edit-sel option{background:#1e1e28}
.lb-edit-btn{font-size:11px;font-weight:600;color:rgba(255,255,255,.4);background:none;border:none;cursor:pointer;font-family:inherit;padding:3px 6px;border-radius:var(--r-sm);transition:all .15s;white-space:nowrap;flex-shrink:0}
.lb-edit-btn:hover{color:#fff;background:rgba(255,255,255,.1)}
.lb-save-btn{height:30px;padding:0 12px;background:var(--primary);border:none;border-radius:var(--r-sm);font-size:12px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;flex-shrink:0;transition:background .15s}
.lb-save-btn:hover{background:var(--primary-dark)}
.lb-comments-title{font-size:13px;font-weight:700;color:rgba(255,255,255,.7);margin-bottom:10px}
.lb-comment-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;max-height:180px;overflow-y:auto}
.lb-comment-item{background:rgba(255,255,255,.06);border-radius:var(--r-md);padding:9px 12px;border:1px solid rgba(255,255,255,.07)}
.lb-comment-author{font-size:11px;font-weight:700;color:rgba(255,255,255,.6);margin-bottom:3px}
.lb-comment-body{font-size:12px;color:rgba(255,255,255,.75)}
.lb-inp{width:100%;height:36px;padding:0 12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-md);font-size:12px;font-family:inherit;color:#fff;outline:none;transition:border .15s}
.lb-inp::placeholder{color:rgba(255,255,255,.3)}
.lb-inp:focus{border-color:rgba(255,255,255,.35)}
.lb-send-btn{height:36px;padding:0 14px;background:var(--primary);border:none;border-radius:var(--r-md);font-size:12px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s}
.lb-send-btn:hover{background:var(--primary-dark)}

/* ─── GALLERY BODY ─── */
.gallery-body{display:flex;flex:1;overflow:hidden;min-height:0}

/* ─── SIDEBAR ─── */
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--line-alt);overflow-y:auto;padding:12px 0}
.sb-section-lbl{font-size:11px;font-weight:700;color:var(--label-disable);letter-spacing:.8px;padding:8px 16px 4px;text-transform:uppercase}
.sb-all{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;cursor:pointer;font-size:14px;font-weight:700;color:var(--label-normal);transition:background .12s;border-left:3px solid transparent}
.sb-all:hover{background:var(--bg)}
.sb-all.active{background:var(--primary-alt);color:var(--primary);border-left-color:var(--primary)}
.sb-l{display:flex;align-items:center;gap:8px;padding:8px 16px 6px;cursor:pointer;transition:background .12s;border-left:3px solid transparent}
.sb-l:hover{background:var(--bg)}
.sb-l.active{background:var(--primary-alt);border-left-color:var(--primary)}
.sb-l-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:var(--r-xs);background:var(--bg-deep);color:var(--label-assist);flex-shrink:0}
.sb-l.active .sb-l-badge{background:var(--primary-alt);color:var(--primary)}
.sb-l-name{font-size:13px;font-weight:700;color:var(--label-normal);flex:1}
.sb-l.active .sb-l-name{color:var(--primary)}
.sb-count{font-size:12px;font-weight:600;color:var(--label-disable)}
.sb-l.active .sb-count{color:var(--primary)}
.sb-m-list{overflow:hidden;transition:max-height .2s ease}
.sb-m{display:flex;align-items:center;justify-content:space-between;padding:5px 16px 5px 36px;cursor:pointer;font-size:12px;color:var(--label-assist);transition:all .12s;border-left:3px solid transparent}
.sb-m:hover{background:var(--bg);color:var(--label-normal)}
.sb-m.active{color:var(--primary);font-weight:700;border-left-color:var(--primary);background:var(--primary-alt)}
.sb-m-count{font-size:11px;font-weight:600;color:var(--label-disable)}
.sb-m.active .sb-m-count{color:var(--primary)}

/* ─── GALLERY MAIN ─── */
.gallery-main{flex:1;overflow-y:auto;padding:20px}

/* ─── CARD GRID ─── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}

/* ─── MONTAGE CARD — 세로형 (9:16) ─── */
.m-card{background:var(--surface);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;border:1px solid var(--line-alt)}
.m-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.1);border-color:transparent}
.card-thumb{width:100%;aspect-ratio:390/844;position:relative;overflow:hidden;display:flex;flex-direction:column;padding:14px;gap:6px}
.thumb-company{font-size:9px;font-weight:700;margin-top:auto;opacity:.4}
.thumb-bar{height:8px;border-radius:3px;background:rgba(0,0,0,.13)}
.thumb-bar2{height:6px;border-radius:3px;background:rgba(0,0,0,.08)}
.thumb-block{height:28px;border-radius:5px;background:rgba(0,0,0,.14);margin-top:2px}
.thumb-block2{height:18px;border-radius:5px;background:rgba(0,0,0,.08)}
.overlay-lead{position:absolute;top:8px;left:8px}
.overlay-trail{position:absolute;top:8px;right:8px}
.overlay-tag{background:rgba(0,0,0,.52);color:#fff;font-size:10px;font-weight:600;padding:3px 8px;border-radius:var(--r-xs);letter-spacing:.3px}
.bm-btn{width:28px;height:28px;border-radius:var(--r-full);background:rgba(255,255,255,.88);border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .18s;line-height:1}
.bm-btn:hover{background:#fff;transform:scale(1.12)}
.bm-btn.on{color:var(--error)}
.card-content{padding:10px 10px 12px}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.card-title{font-size:12px;font-weight:700;color:var(--label-normal);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:2px}
.card-caption{font-size:11px;color:var(--label-alt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--line-alt)}
.act-btn{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--label-assist);background:none;border:none;cursor:pointer;font-family:inherit;padding:3px 5px;border-radius:var(--r-sm);transition:all .15s}
.act-btn:hover{background:var(--bg);color:var(--label-alt)}
.act-btn.liked{color:var(--error)}
.act-btn svg{width:13px;height:13px;flex-shrink:0}

/* ─── BADGE ─── */
.badge{display:inline-flex;align-items:center;height:20px;padding:0 7px;border-radius:var(--r-xs);font-size:11px;font-weight:600;white-space:nowrap}
.badge-primary{background:var(--primary-alt);color:var(--primary)}
.badge-car{background:#EBF3FF;color:#1A5DC8}
.badge-health{background:#E6F7ED;color:#007A38}
.badge-driver{background:#FFF3E5;color:#A05200}
.badge-none{background:var(--bg-deep);color:var(--label-assist)}
.badge-neutral{background:var(--bg-deep);color:var(--label-neutral)}

/* ─── SKELETON ─── */
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.skel{border-radius:var(--r-xs);background:linear-gradient(90deg,var(--bg-deep) 25%,var(--bg) 50%,var(--bg-deep) 75%);background-size:1200px 100%;animation:shimmer 1.5s infinite}
.skel-thumb{width:100%;aspect-ratio:3/2;border-radius:0}
.skel-h{height:15px;margin-bottom:6px;border-radius:var(--r-xs)}
.skel-c{height:12px;border-radius:var(--r-xs)}
.skel-badge{height:20px;width:44px;border-radius:var(--r-xs)}

/* ─── EMPTY ─── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 24px;gap:8px;color:var(--label-assist);font-size:13px}

/* ─── ADMIN ─── */
.admin-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.admin-title{font-size:18px;font-weight:800}
.admin-acts{display:flex;gap:8px}
.btn-outline{height:36px;padding:0 14px;border:1px solid var(--line);border-radius:var(--r-md);background:var(--surface);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--label-normal);transition:all .15s}
.btn-outline:hover{background:var(--bg)}
.btn-danger{border-color:var(--error-line);background:var(--error-bg);color:var(--error)}
.btn-danger:hover{background:#FFEAEA}
.tbl-wrap{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--line-alt);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--label-assist);border-bottom:1px solid var(--line-alt);background:var(--bg);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--line-alt);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tr.selected td{background:#F0F4FF}
tbody tr:hover td{background:#FAFAFE}
.cb{width:15px;height:15px;cursor:pointer;accent-color:var(--primary)}
.td-acts{display:flex;gap:6px}
.tbl-btn{height:28px;padding:0 10px;border-radius:var(--r-sm);border:1px solid var(--line);background:var(--surface);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--label-normal);transition:all .15s}
.tbl-btn:hover{background:var(--bg)}
.tbl-btn-del{border-color:var(--error-line);background:var(--error-bg);color:var(--error)}
.tbl-btn-del:hover{background:#FFEAEA}
.delete-confirm{display:none;align-items:center;gap:6px;margin-top:6px;padding:6px 8px;background:#FFF5F5;border-radius:var(--r-sm);border:1px solid var(--error-line)}

/* ─── MYPAGE ─── */
.my-profile{display:flex;align-items:center;gap:14px;padding:20px;background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--line-alt);margin-bottom:24px}
.my-avatar{width:52px;height:52px;border-radius:var(--r-full);background:var(--label-normal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800}
.my-name{font-size:16px;font-weight:800}
.my-sub{font-size:12px;color:var(--label-assist);margin-top:2px}
.my-sec{margin-bottom:28px}
.sec-hd{display:flex;align-items:baseline;gap:8px;margin-bottom:14px}
.sec-title{font-size:16px;font-weight:800}
.sec-count{font-size:13px;color:var(--label-assist)}
.my-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.mini-card{background:var(--surface);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;border:1px solid var(--line-alt);transition:all .18s}
.mini-card:hover{border-color:var(--primary);transform:translateY(-2px)}
.mini-thumb{aspect-ratio:390/844;display:flex;flex-direction:column;padding:10px;gap:6px}
.mini-label{padding:8px 10px;font-size:12px;font-weight:700;color:var(--label-normal)}
.mini-sub{padding:0 10px 8px;font-size:11px;color:var(--label-assist)}

/* ─── MODAL OVERLAY ─── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}

/* ─── UPLOAD MODAL ─── */
.upload-modal{background:var(--surface);border-radius:var(--r-xl);width:460px;max-width:100%;padding:24px;max-height:90vh;overflow-y:auto}
.modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:17px;font-weight:800}
.close-btn{width:32px;height:32px;border-radius:var(--r-md);background:none;border:none;cursor:pointer;font-size:18px;color:var(--label-assist);display:flex;align-items:center;justify-content:center;transition:background .15s}
.close-btn:hover{background:var(--bg)}
.form-grp{margin-bottom:16px}
.form-lbl{font-size:12px;font-weight:700;color:var(--label-alt);margin-bottom:6px;display:block}
.form-inp{width:100%;height:40px;padding:0 12px;border:1px solid var(--line);border-radius:var(--r-md);font-size:13px;font-family:inherit;background:var(--surface);outline:none;transition:border .15s;color:var(--label-normal)}
.form-inp:focus{border-color:var(--primary)}
.parse-prev{background:var(--bg);border-radius:var(--r-md);padding:12px;display:none;margin-top:8px;border:1px solid var(--line-alt)}
.parse-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--line-alt);font-size:12px}
.parse-row:last-child{border:none}
.parse-k{color:var(--label-assist)}
.parse-v{font-weight:700}
.dropzone{border:1.5px dashed var(--line);border-radius:var(--r-lg);padding:28px 20px;text-align:center;cursor:pointer;background:var(--bg);transition:all .15s;position:relative}
.dropzone:hover,.dropzone.dragover{border-color:var(--primary);background:var(--primary-alt)}
.dz-icon{font-size:28px;color:var(--label-disable);margin-bottom:8px}
.dz-text{font-size:13px;color:var(--label-alt);font-weight:500}
.dz-sub{font-size:11px;color:var(--label-disable);margin-top:4px}
.dz-file-inp{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.file-preview{margin-top:10px;display:none;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:var(--r-md);border:1px solid var(--line-alt)}
.file-thumb{width:48px;height:36px;border-radius:var(--r-sm);object-fit:cover;border:1px solid var(--line-alt)}
.file-name{font-size:12px;font-weight:600;color:var(--label-normal);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-size{font-size:11px;color:var(--label-assist)}
.remove-file{background:none;border:none;cursor:pointer;color:var(--label-assist);font-size:16px;padding:2px}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* ─── EDIT MODAL ─── */
.edit-modal{background:var(--surface);border-radius:var(--r-xl);width:420px;max-width:100%;padding:24px}

/* ─── PENDING ITEM ─── */
.pending-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:var(--r-md);border:1px solid var(--line-alt)}
.pending-item.error{border-color:var(--error-line);background:var(--error-bg)}
.pending-thumb{height:52px;aspect-ratio:390/844;border-radius:var(--r-sm);object-fit:cover;border:1px solid var(--line-alt);flex-shrink:0}
.pending-info{flex:1;min-width:0}
.pending-filename{font-size:12px;font-weight:600;color:var(--label-normal);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.pending-parsed{display:flex;gap:4px;flex-wrap:wrap}
.pending-remove{background:none;border:none;cursor:pointer;color:var(--label-disable);font-size:16px;padding:2px 4px;flex-shrink:0;transition:color .15s}
.pending-remove:hover{color:var(--error)}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--label-normal);color:#fff;padding:12px 20px;border-radius:var(--r-lg);font-size:13px;font-weight:500;z-index:999;transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .25s;opacity:0;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>

const COLORS = ['#EBF3FF','#E6F7ED','#FFF3E5','#F3EEFF','#E6F5F2','#FFF0F0','#F0F4FF','#FFF8E5'];

let screens = [];
let liked = new Set();

let insFilter = 'all';
let curId = null;

// ─── HELPERS ───
const getL = l => L_LABELS[l] || l;
const getM = (l,m) => (M_LABELS[l] && M_LABELS[l][m]) || m;
const thumbColor = s => COLORS[s.id % COLORS.length];

// ─── SIDEBAR STATE ───
let sidebarL = ''; // 선택된 대분류 ('' = 전체)
let sidebarM = ''; // 선택된 중분류

function countScreens(l, m) {
  return screens.filter(s => {
    if(l && s.l !== l) return false;
    if(m && s.m !== m) return false;
    if(insFilter !== 'all' && s.ins !== insFilter) return false;
    return true;
  }).length;
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  const totalCount = countScreens('', '');

  let html = `<div class="sb-section-lbl">분류</div>`;
  html += `<div class="sb-all ${!sidebarL?'active':''}" onclick="setSidebarL('')">
    <span>전체 보기</span>
    <span class="sb-count">${totalCount}</span>
  </div>`;

  Object.entries(L_LABELS).forEach(([l, lName]) => {
    const lCount = countScreens(l, '');
    const isLActive = sidebarL === l;
    const mEntries = M_LABELS[l] ? Object.entries(M_LABELS[l]) : [];

    html += `<div class="sb-l ${isLActive && !sidebarM ? 'active' : ''}" onclick="setSidebarL('${l}')">
      <span class="sb-l-badge">${l}</span>
      <span class="sb-l-name">${lName}</span>
      <span class="sb-count">${lCount}</span>
    </div>`;

    if(mEntries.length) {
      html += `<div class="sb-m-list" style="max-height:${isLActive ? mEntries.length*32 : 0}px">`;
      mEntries.forEach(([m, mName]) => {
        const mCount = countScreens(l, m);
        html += `<div class="sb-m ${isLActive && sidebarM===m ? 'active' : ''}" onclick="setSidebarM('${l}','${m}')">
          <span>${mName}</span>
          <span class="sb-m-count">${mCount}</span>
        </div>`;
      });
      html += `</div>`;
    }
  });

  sb.innerHTML = html;
}

function setSidebarL(l) {
  sidebarL = l;
  sidebarM = '';
  renderSidebar();
  renderGallery();
}

function setSidebarM(l, m) {

  renderGallery();

// ─── GALLERY ───
function renderGallery() {
  const filtered = screens.filter(s => {
    if(sidebarL && s.l !== sidebarL) return false;
    if(sidebarM && s.m !== sidebarM) return false;
    if(insFilter !== 'all' && s.ins !== insFilter) return false;
    return true;
  });
  document.getElementById('results-info').textContent = `${filtered.length}개 스크린`;
  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = '';

  if(!filtered.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div style="font-size:32px">🔍</div><div>조건에 맞는 스크린이 없습니다</div></div>`;
    return;
  }

  const frag = document.createDocumentFragment();
  filtered.forEach(s => {
    const card = document.createElement('div');
    card.className = 'm-card';
    card.onclick = () => openScreen(s.id);

    // 썸네일 — imgSrc가 있으면 img 태그로, 없으면 목업 div로
    const thumbWrap = document.createElement('div');
    thumbWrap.className = 'card-thumb';
    thumbWrap.style.padding = '0';

    if(s.imgSrc) {
      const img = document.createElement('img');
      img.src = s.imgSrc;
      img.alt = s.co;
      img.style.cssText = 'width:100%;height:100%;object-fit:contain;display:block;position:absolute;inset:0;background:#fff';
      thumbWrap.appendChild(img);
    } else {
      thumbWrap.insertAdjacentHTML('beforeend', thumbHTML(s));
    }

    // 오버레이
    thumbWrap.insertAdjacentHTML('beforeend', `
      <div class="overlay-lead"><span class="overlay-tag">${s.l}${s.m}</span></div>
      <div class="overlay-trail">
        <button class="bm-btn ${liked.has(s.id)?'on':''}"
          onclick="event.stopPropagation();toggleLike(${s.id})">
          ${liked.has(s.id)?'♥':'♡'}
        </button>
      </div>`);

    // 카드 내용
    const content = document.createElement('div');
    content.className = 'card-content';
    content.innerHTML = `
      <div class="card-badges">${insBadge(s.ins)}</div>
      <div class="card-title">${s.co}</div>
      <div class="card-caption">${getM(s.l,s.m)}</div>
      <div class="card-foot">
        <button class="act-btn ${liked.has(s.id)?'liked':''}"
          onclick="event.stopPropagation();toggleLike(${s.id})">
          <svg viewBox="0 0 16 16" fill="${liked.has(s.id)?'currentColor':'none'}" stroke="currentColor" stroke-width="1.5">
            <path d="M8 13.5S2 9.5 2 5.5a3 3 0 0 1 6-1 3 3 0 0 1 6 1c0 4-6 8-6 8z"/>
          </svg>
          ${s.likes}
        </button>
        <button class="act-btn" onclick="event.stopPropagation();openScreen(${s.id})">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 8a6 6 0 1 0 12 0A6 6 0 0 0 2 8z"/><path d="M8 5v3l2 2"/>
          </svg>
          ${s.comments.length}
        </button>
      </div>`;

    card.appendChild(thumbWrap);
    card.appendChild(content);
    frag.appendChild(card);
  });

  grid.appendChild(frag);
}

function setIns(btn, val) {
  document.querySelectorAll('.ins-chips .chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  insFilter = val;
  renderSidebar();
  renderGallery();
}

// ─── LIKE ───
async function toggleLike(id) {
  const s = screens.find(x => x.id === id);
  if(!s) return;
  const isLiked = liked.has(id);
  // 낙관적 업데이트
  if(isLiked) { liked.delete(id); s.likes = Math.max(0, s.likes-1); }
  else         { liked.add(id);   s.likes++; }
  renderGallery();
  if(curId === id) refreshModal(s);
  // DB 반영
  try {
    await dbToggleLike(id, isLiked);
    showToast(isLiked ? '좋아요를 취소했습니다' : '♥ 좋아요를 눌렀습니다');
  } catch(e) {
    // 실패 시 롤백
    if(isLiked) { liked.add(id); s.likes++; }
    else         { liked.delete(id); s.likes = Math.max(0, s.likes-1); }
    renderGallery();
    if(curId === id) refreshModal(s);
  }
}
function toggleLikeModal() { if(curId) toggleLike(curId); }

function refreshModal(s) {
  const btn = document.getElementById('sm-like-btn');
  const isLiked = liked.has(s.id);
  btn.className = 'lb-like-btn' + (isLiked ? ' liked' : '');
  document.getElementById('sm-like-icon').textContent = isLiked ? '♥' : '♡';
  document.getElementById('sm-like-n').textContent = s.likes;
}

// ─── LIGHTBOX ───
let lightboxList = []; // 현재 필터된 스크린 순서
let lightboxIdx  = 0;

function openScreen(id) {
  // 현재 갤러리 필터 기준으로 순서 목록 구성
  lightboxList = screens.filter(s => {
    if(sidebarL && s.l !== sidebarL) return false;
    if(sidebarM && s.m !== sidebarM) return false;
    if(insFilter !== 'all' && s.ins !== insFilter) return false;
    return true;
  });
  lightboxIdx = lightboxList.findIndex(s => s.id === id);
  if(lightboxIdx === -1) lightboxIdx = 0;
  curId = id;
  fillLightbox(lightboxList[lightboxIdx]);
  document.getElementById('screen-modal').classList.add('open');
}

function fillLightbox(s) {
  curId = s.id;
  document.getElementById('sm-title').textContent = `${s.co} · ${getM(s.l, s.m)}`;
  document.getElementById('sm-meta').textContent  = `${s.l} ${getL(s.l)} · ${s.m}`;
  document.getElementById('lb-screen-label').textContent = `${lightboxIdx + 1} / ${lightboxList.length}`;

  const pw = document.getElementById('sm-preview-wrap');
  pw.style.background = thumbColor(s);
  pw.innerHTML = thumbHTML(s);

}

  const co  = newCo  || s.co;
  const l   = newL   || s.l;
  const m   = newM   || s.m;
  const ins = newIns !== undefined ? newIns : s.ins;
  try {
    await dbUpdateScreen(s.id, { co, l, m, ins });
    s.co = co; s.l = l; s.m = m; s.ins = ins;
    document.getElementById('sm-title').textContent = `${s.co} · ${getM(s.l, s.m)}`;

// ─── UPLOAD (multi-file) ───
let pendingFiles = []; // [{file, imgSrc(base64), parsed:{co,l,m,ins}}]

function openUpload() {
  document.getElementById('upload-modal').classList.add('open');
}

function closeUpload() {
  document.getElementById('upload-modal').classList.remove('open');
  clearAllFiles();
}

function handleFileSelect(inp) {
  if(inp.files && inp.files.length) addFiles([...inp.files]);
  inp.value = '';
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropzone').classList.remove('dragover');
  const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
  if(files.length) addFiles(files);
}

function addFiles(files) {
  let loaded = 0;
  const total = files.length;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const parsed = parseFilenameSilent(file.name.replace(/\.[^.]+$/, ''));
      pendingFiles.push({ file, imgSrc: ev.target.result, parsed });
      loaded++;
      if(loaded === total) renderPendingList();
    };
    reader.readAsDataURL(file);
  });
}

function parseFilenameSilent(fn) {
  const parts = fn.split('-');
  const co  = parts[0] || '';
  const lm  = parts[1] || '';
  const lM  = lm.match(/L\d+/), mM = lm.match(/M\d+/);
  const l   = lM ? lM[0] : 'L00';
  const m   = mM ? mM[0] : 'M01';
  const ins = parts[2] || '';
  return { co, l, m, ins };
}

function renderPendingList() {
  const listWrap = document.getElementById('pending-list');
  const itemsEl  = document.getElementById('pending-items');
  const btn      = document.getElementById('upload-submit-btn');

  if(!pendingFiles.length) {
    listWrap.style.display = 'none';
    btn.disabled = true; btn.style.opacity = '.4'; btn.style.cursor = 'not-allowed';
    return;
  }

  listWrap.style.display = 'block';
  document.getElementById('pending-count').textContent = `${pendingFiles.length}개 파일 선택됨`;
  btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer';

  const frag = document.createDocumentFragment();
  pendingFiles.forEach((pf, idx) => {
    const p = pf.parsed;
    const item = document.createElement('div');
    item.className = `pending-item${!p.co ? ' error' : ''}`;

    const img = document.createElement('img');
    img.className = 'pending-thumb';
    img.src = pf.imgSrc;
    item.appendChild(img);

    item.insertAdjacentHTML('beforeend', `
      <div class="pending-info">
        <div class="pending-filename">${pf.file.name}</div>
        <div class="pending-parsed">
          ${p.co
            ? `<span class="badge badge-neutral">${p.co}</span>`
            : `<span class="badge" style="background:#FFF0F0;color:var(--error)">기업명 없음</span>`}
          ${lBadge(p.l)}
          <span class="badge badge-neutral">${p.m} ${getM(p.l,p.m)}</span>
          ${insBadge(p.ins)}
          <span class="badge badge-neutral">${formatSize(pf.file.size)}</span>
        </div>
      </div>
      <button class="pending-remove" data-idx="${idx}">✕</button>`);
    frag.appendChild(item);
  });
  itemsEl.innerHTML = '';
  itemsEl.appendChild(frag);

  itemsEl.querySelectorAll('.pending-remove').forEach(b => {
    b.addEventListener('click', () => removePending(+b.dataset.idx));
  });
}

function removePending(idx) {
  pendingFiles.splice(idx, 1);
  renderPendingList();
}

function clearAllFiles() {
  pendingFiles = [];
  const inp = document.getElementById('file-inp');
  if(inp) inp.value = '';
  renderPendingList();
}

function formatSize(bytes) {
  if(bytes < 1024) return bytes + ' B';
  if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

async function doUpload() {
  if(!pendingFiles.length) { showToast('파일을 선택하세요'); return; }

  const btn = document.getElementById('upload-submit-btn');
  btn.disabled = true; btn.textContent = '업로드 중...';

  let success = 0, fail = 0;
  for(const pf of pendingFiles) {
    try {
      const screen = await dbUploadScreen(pf.file, pf.parsed);
      screens.unshift(screen);
      success++;
    } catch(e) {
      fail++;
      console.error(e);
    }
  }

  pendingFiles = [];
  document.getElementById('file-inp').value = '';
  document.getElementById('upload-modal').classList.remove('open');
  document.getElementById('pending-list').style.display = 'none';
  btn.disabled = false; btn.textContent = '업로드';

  renderSidebar();
  renderGallery();
  showToast(fail ? `${success}개 완료, ${fail}개 실패` : `${success}개 업로드 완료!`);
}

// ─── MYPAGE ───
function renderMypage() {
  const lk = screens.filter(s => liked.has(s.id));
  const cm = screens.filter(s => commented.has(s.id));
  document.getElementById('like-count').textContent = lk.length + '개';
  document.getElementById('comment-count').textContent = cm.length + '개';

  function fillGrid(el, list, emptyMsg) {
    el.innerHTML = '';
    if(!list.length) { el.innerHTML = `<div class="empty">${emptyMsg}</div>`; return; }
    const frag = document.createDocumentFragment();
    list.forEach(s => {
      const card = document.createElement('div');
      card.className = 'mini-card';
      card.onclick = () => openScreen(s.id);

      const thumb = document.createElement('div');
      thumb.className = 'mini-thumb';
      thumb.style.background = thumbColor(s);
      thumb.style.position = 'relative';
      thumb.style.overflow = 'hidden';

      if(s.imgSrc) {
        const img = document.createElement('img');
        img.src = s.imgSrc;
        img.alt = s.co;
        img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#fff';
        thumb.appendChild(img);
      } else {
        thumb.innerHTML = `
          <div class="thumb-bar" style="width:70%"></div>
          <div class="thumb-bar2" style="width:50%"></div>
          <div class="thumb-block"></div>`;
      }

      card.appendChild(thumb);
      card.insertAdjacentHTML('beforeend', `
        <div class="mini-label">${s.co}</div>
        <div class="mini-sub">${s.l}${s.m} · ${INS[s.ins]||'없음'}</div>`);
      frag.appendChild(card);
    });
    el.appendChild(frag);
  }

  fillGrid(document.getElementById('liked-grid'),    lk, '좋아요한 스크린이 없습니다');
  fillGrid(document.getElementById('commented-grid'), cm, '코멘트한 스크린이 없습니다');
}

// ─── PAGE SWITCH ───
function showPage(p) {
  document.querySelectorAll('.page').forEach(el => {
    el.classList.remove('active');
    el.style.display = 'none';
  });
  document.querySelectorAll('.seg-btn').forEach(el => el.classList.remove('active'));
  const target = document.getElementById('page-'+p);
  target.classList.add('active');
  target.style.display = (p === 'gallery') ? 'flex' : 'block';
  const idx = {gallery:0, admin:1, mypage:2}[p];
  document.querySelectorAll('.seg-btn')[idx].classList.add('active');
  if(p==='gallery') renderGallery();
  if(p==='admin')   renderAdmin();
  if(p==='mypage')  renderMypage();
}

// ─── SUPABASE CRUD ───

async function dbLoadAll() {
  showLoading(true);
  try {
    const { data: rows, error } = await supa
      .from('screens')
      .select('*')
      .order('created_at', { ascending: false });
    if(error) throw error;

    const { data: myLikes } = await supa
      .from('likes')
      .select('screen_id')
      .eq('user_key', userKey);
    liked = new Set((myLikes||[]).map(r => r.screen_id));

    const { data: myCmts } = await supa
      .from('comments')
      .select('screen_id')
      .eq('author', userKey);
    commented = new Set((myCmts||[]).map(r => r.screen_id));

    screens = (rows||[]).map(r => ({
      id:       r.id,
      co:       r.co,
      l:        r.l,
      m:        r.m,
      ins:      r.ins || '',
      likes:    r.likes || 0,
      imgSrc:   r.img_url ? supa.storage.from(BUCKET).getPublicUrl(r.img_url).data.publicUrl : '',
      imgPath:  r.img_url || '',
      comments: []
    }));

    if(screens.length) {
      const { data: allCmts } = await supa
        .from('comments')
        .select('*')
        .order('created_at', { ascending: true });
      (allCmts||[]).forEach(c => {
        const s = screens.find(x => x.id === c.screen_id);
        if(s) s.comments.push({ a: c.author, t: c.body, dbId: c.id });
      });
    }

    // DB는 연결됐지만 데이터가 없으면 샘플 보여줌
    if(screens.length === 0) loadSampleData();

  } catch(e) {
    // DB 연결 실패 시에도 샘플 데이터로 UI 확인 가능
    console.warn('DB 연결 실패, 샘플 데이터로 표시합니다:', e.message);
    loadSampleData();
  }
  showLoading(false);
  renderSidebar();
  renderGallery();
}

async function dbUploadScreen(file, parsed) {
  // 1. Storage에 이미지 업로드
  const ext  = file.name.split('.').pop();
  const path = `${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
  const { error: upErr } = await supa.storage.from(BUCKET).upload(path, file, { upsert: false });
  if(upErr) throw upErr;

  // 2. DB에 메타데이터 insert
  const { data, error: dbErr } = await supa.from('screens').insert({
    co:      parsed.co || '미정',
    l:       parsed.l,
    m:       parsed.m,
    ins:     parsed.ins,
    img_url: path,
    likes:   0
  }).select().single();
  if(dbErr) throw dbErr;

  return {
    id:      data.id,
    co:      data.co,
    l:       data.l,
    m:       data.m,
    ins:     data.ins || '',
    likes:   0,
    imgSrc:  supa.storage.from(BUCKET).getPublicUrl(path).data.publicUrl,
    imgPath: path,
    comments: []
  };
}

async function dbDeleteScreen(id) {
  const s = screens.find(x => x.id === id);
  // Storage 이미지 삭제
  if(s && s.imgPath) await supa.storage.from(BUCKET).remove([s.imgPath]);
  // DB 삭제 (cascade로 comments/likes도 삭제됨)
  const { error } = await supa.from('screens').delete().eq('id', id);
  if(error) throw error;
}

async function dbUpdateScreen(id, { co, l, m, ins }) {
  const { error } = await supa.from('screens').update({ co, l, m, ins }).eq('id', id);
  if(error) throw error;
}

async function dbToggleLike(screenId, isLiked) {
  if(isLiked) {
    // 좋아요 취소
    await supa.from('likes').delete().eq('screen_id', screenId).eq('user_key', userKey);
    await supa.from('screens').update({ likes: Math.max(0, (screens.find(x=>x.id===screenId)?.likes||1)-1) }).eq('id', screenId);
  } else {
    // 좋아요 추가
    await supa.from('likes').insert({ screen_id: screenId, user_key: userKey });
    await supa.from('screens').update({ likes: (screens.find(x=>x.id===screenId)?.likes||0)+1 }).eq('id', screenId);
  }
}

async function dbAddComment(screenId, author, body) {
  const { data, error } = await supa.from('comments').insert({
    screen_id: screenId, author, body
  }).select().single();
  if(error) throw error;
  return data;
}

// ─── LOADING UI ───
function showLoading(on) {
  let el = document.getElementById('loading-overlay');
  if(on && !el) {
    el = document.createElement('div');
    el.id = 'loading-overlay';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(247,247,248,.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;backdrop-filter:blur(4px)';
    el.innerHTML = '<div style="width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite"></div><div style="font-size:13px;color:var(--label-assist);font-weight:500">불러오는 중...</div>';
    if(!document.querySelector('#spin-style')) {
      const st = document.createElement('style');
      st.id = 'spin-style';
      st.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
      document.head.appendChild(st);
    }
    document.body.appendChild(el);
  } else if(!on && el) {
    el.remove();
  }
}

// 관리자 이벤트 위임
document.addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const id  = +btn.dataset.id;
  const act = btn.dataset.action;
  if(act === 'delete') {
    document.querySelectorAll('.delete-confirm').forEach(el => el.style.display = 'none');
    const dc = document.getElementById('dc-' + id);
    if(dc) dc.style.display = 'flex';
    return;
  }
  if(act === 'confirm-delete') { doDeleteScreen(id); return; }
  if(act === 'cancel-delete')  { const dc = document.getElementById('dc-'+id); if(dc) dc.style.display='none'; return; }
  if(act === 'edit')           { openEdit(id); return; }
});

// 키보드 탐색
document.addEventListener('keydown', function(e) {
  if(!document.getElementById('screen-modal').classList.contains('open')) return;
  if(e.key === 'ArrowLeft')  lightboxNav(-1);
  if(e.key === 'ArrowRight') lightboxNav(1);
  if(e.key === 'Escape')     closeScreen();
});

// 체크박스 위임
document.addEventListener('change', function(e) {
  const cb = e.target.closest('.row-cb');
  if(cb) updateRowStyle(+cb.dataset.id, cb);
});
